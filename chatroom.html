<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatroom — STOMP</title>

  <!--
    ═══════════════════════════════════════════════════════════════
    STEP 1: STOMP + SockJS Frontend
    ═══════════════════════════════════════════════════════════════

    WHAT CHANGED FROM PHASE 2:
      - Replaced raw new WebSocket() with @stomp/stompjs Client
      - Replaced socket.send() with stompClient.publish()
      - Replaced socket.onmessage with stompClient.subscribe()
      - Server URL goes back to ws://localhost:8080/ws (not /ws/websocket)
        because SockJS handles the transport negotiation now

    WHY THIS MAKES EVERYTHING WORK:
      Raw WebSocket just sends bytes down a pipe.
      Spring Boot's @MessageMapping needs a STOMP SEND frame which looks like:

        SEND
        destination:/app/chat.send
        content-type:application/json

        {"content":"Hello","sender":"alice","type":"CHAT"}

      Without the destination header, Spring has no idea where
      to route the message. @MessageMapping never fires.
      STOMP adds that header automatically.

    THE TWO LIBRARIES WE LOAD FROM CDN:
      1. SockJS   — handles transport (WebSocket → HTTP fallback)
      2. @stomp/stompjs — handles STOMP protocol framing on top of SockJS

      We load them from cdnjs.cloudflare.com — no npm needed.
      In Phase 4 (Vue + Vite) we'll install them properly via npm.
      For now, CDN is perfect.
  -->

  <!--
    SockJS client — transport layer
    Tries native WebSocket first. Falls back to HTTP streaming,
    then long-polling if WebSocket is blocked.
    Connects to our Spring Boot /ws SockJS endpoint.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>

  <!--
    @stomp/stompjs — STOMP protocol layer on top of SockJS
    Handles: CONNECT frame, SEND frame, SUBSCRIBE frame,
    heartbeats, automatic reconnection, JSON serialization.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    /*
      CSS IS IDENTICAL TO PHASE 1 AND 2.
      Visual design does not change when we fix the transport layer.
      This separation (presentation vs logic) is intentional.
    */
    :root {
      --bg-base:       #080c10;
      --bg-surface:    #0d1117;
      --bg-raised:     #161b22;
      --border:        #21262d;
      --border-focus:  #388bfd;
      --accent:        #388bfd;
      --text-primary:  #e6edf3;
      --text-secondary:#7d8590;
      --text-muted:    #30363d;
      --green:         #3fb950;
      --red:           #f85149;
      --my-bubble:     #132032;
      --their-bubble:  #161b22;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Azeret Mono', monospace;
      font-size: 14px;
      background: var(--bg-base);
      color: var(--text-primary);
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    #join-screen {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(circle, #21262d 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .join-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.6);
    }

    .window-dots { display: flex; gap: 7px; margin-bottom: 28px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }

    .join-title    { font-size: 22px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; letter-spacing: -0.5px; }
    .join-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 28px; letter-spacing: 0.5px; text-transform: uppercase; }

    .field-label {
      display: block; font-size: 11px; color: var(--accent);
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;
    }
    .field-input {
      width: 100%; background: var(--bg-base); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; font-family: 'Azeret Mono', monospace;
      font-size: 14px; color: var(--text-primary); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; margin-bottom: 20px;
    }
    .field-input::placeholder { color: var(--text-muted); }
    .field-input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(56,139,253,0.12); }

    .btn-primary {
      width: 100%; background: var(--accent); color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-family: 'Azeret Mono', monospace;
      font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    .btn-primary:hover  { background: #1f6feb; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { background: var(--bg-raised); color: var(--text-muted); cursor: not-allowed; }

    .error-text { color: var(--red); font-size: 12px; margin-top: 12px; display: none; }

    #chat-screen { height: 100vh; display: none; flex-direction: column; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; height: 52px; background: var(--bg-surface);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .topbar-left  { display: flex; align-items: center; gap: 16px; }
    .topbar-right { display: flex; align-items: center; gap: 14px; }

    .brand { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
    .brand span { color: var(--accent); }

    .phase-badge {
      font-size: 10px; background: rgba(56,139,253,0.1); color: var(--accent);
      padding: 2px 8px; border-radius: 100px; border: 1px solid rgba(56,139,253,0.3);
      letter-spacing: 1px;
    }

    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-muted); transition: background 0.3s; }
    .status-dot.connected  { background: var(--green); box-shadow: 0 0 6px rgba(63,185,80,0.6); }
    .status-dot.connecting { background: #e3b341; animation: pulse 1s infinite; }
    .status-dot.error      { background: var(--red); }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .current-user { font-size: 12px; color: var(--accent); }
    .btn-leave {
      font-family: 'Azeret Mono', monospace; font-size: 11px; color: var(--text-secondary);
      background: transparent; border: 1px solid var(--border); border-radius: 6px;
      padding: 5px 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .btn-leave:hover { color: var(--red); border-color: var(--red); }

    .chat-body { display: flex; flex: 1; overflow: hidden; }
    .messages-column { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    #message-list {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 2px;
    }

    .message { display: flex; gap: 10px; padding: 4px 6px; border-radius: 8px; transition: background 0.1s; }
    .message:hover { background: rgba(255,255,255,0.02); }
    .message.mine  { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 8px; display: flex;
      align-items: center; justify-content: center; font-size: 13px;
      font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }

    .message-body { display: flex; flex-direction: column; max-width: 68%; }
    .message.mine .message-body { align-items: flex-end; }

    .message-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .message.mine .message-meta { flex-direction: row-reverse; }
    .message-sender { font-size: 12px; font-weight: 700; color: var(--accent); }
    .message-time   { font-size: 10px; color: var(--text-muted); }

    .bubble { padding: 9px 13px; border-radius: 12px; font-size: 13px; line-height: 1.55; color: var(--text-primary); word-break: break-word; }
    .message.mine   .bubble { background: var(--my-bubble);    border-radius: 12px 4px 12px 12px; }
    .message.theirs .bubble { background: var(--their-bubble); border-radius: 4px 12px 12px 12px; }

    .system-event { display: flex; justify-content: center; padding: 6px 0; }
    .system-event-text {
      font-size: 11px; color: var(--text-muted); background: var(--bg-surface);
      border: 1px solid var(--border); border-radius: 100px; padding: 3px 14px;
    }
    .system-event-text.join  { color: var(--green); }
    .system-event-text.leave { color: var(--red); }

    .history-divider { display: flex; align-items: center; gap: 10px; padding: 10px 0; }
    .history-divider::before,
    .history-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .history-divider span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; }

    .input-area {
      flex-shrink: 0; display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; background: var(--bg-surface); border-top: 1px solid var(--border);
    }
    .input-prompt { font-size: 13px; color: var(--text-muted); flex-shrink: 0; }

    #message-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-family: 'Azeret Mono', monospace; font-size: 13px;
      color: var(--text-primary); caret-color: var(--accent);
    }
    #message-input::placeholder { color: var(--text-muted); }
    #message-input:disabled { opacity: 0.3; }

    .char-count { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }

    .btn-send {
      flex-shrink: 0; background: var(--accent); color: white; border: none;
      border-radius: 6px; padding: 8px 16px; font-family: 'Azeret Mono', monospace;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-send:hover    { background: #1f6feb; }
    .btn-send:disabled { background: var(--bg-raised); color: var(--text-muted); cursor: not-allowed; }

    .sidebar {
      width: 200px; flex-shrink: 0; border-left: 1px solid var(--border);
      background: var(--bg-surface); display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px; border-bottom: 1px solid var(--border);
      font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px;
    }
    #user-list { flex: 1; overflow-y: auto; padding: 8px 0; list-style: none; }
    .user-item { display: flex; align-items: center; gap: 9px; padding: 7px 16px; font-size: 12px; color: var(--text-secondary); }
    .user-item .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px rgba(63,185,80,0.6); flex-shrink: 0; }
    .user-item.me { color: var(--accent); }

    /* Debug panel */
    #debug-panel {
      position: fixed; bottom: 16px; right: 16px; width: 380px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
      font-size: 11px; z-index: 999; box-shadow: 0 8px 32px rgba(0,0,0,0.6); overflow: hidden;
    }
    .debug-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 14px; background: #161b22; border-bottom: 1px solid #21262d; cursor: pointer;
    }
    .debug-title  { color: #e3b341; font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
    .debug-toggle { color: #7d8590; font-size: 10px; }
    #debug-log    { max-height: 240px; overflow-y: auto; padding: 10px 14px; display: flex; flex-direction: column; gap: 3px; }
    .debug-entry  { display: flex; gap: 8px; line-height: 1.6; }
    .debug-ts     { color: #3fb950; flex-shrink: 0; }
    .debug-tag    { padding: 0 5px; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
    .debug-tag.stomp  { background: #1f3550; color: #388bfd; }
    .debug-tag.send   { background: #1f3d1f; color: #3fb950; }
    .debug-tag.recv   { background: #3d2020; color: #f85149; }
    .debug-tag.http   { background: #2d1f3d; color: #a371f7; }
    .debug-tag.info   { background: #2d2a20; color: #e3b341; }
    .debug-msg { color: #8b949e; word-break: break-all; }
  </style>
</head>
<body>

<!-- ═══ JOIN SCREEN ═══ -->
<div id="join-screen">
  <div class="join-card">
    <div class="window-dots">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
    </div>

    <h1 class="join-title">chatroom_</h1>
    <p class="join-subtitle">stomp · sockjs · spring boot · rabbitmq</p>

    <label class="field-label" for="username-input">your username</label>
    <input id="username-input" class="field-input" type="text"
           placeholder="e.g. alice" maxlength="20" autocomplete="off" />

    <button id="join-btn" class="btn-primary">connect → join</button>
    <p id="error-text" class="error-text"></p>
  </div>
</div>


<!-- ═══ CHAT SCREEN ═══ -->
<div id="chat-screen">
  <header class="topbar">
    <div class="topbar-left">
      <span class="brand"><span>></span> chatroom</span>
      <span class="phase-badge">stomp</span>
      <div class="status-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">disconnected</span>
      </div>
    </div>
    <div class="topbar-right">
      <span id="current-user-label" class="current-user"></span>
      <button id="leave-btn" class="btn-leave">disconnect</button>
    </div>
  </header>

  <div class="chat-body">
    <div class="messages-column">
      <div id="message-list"></div>
      <div class="input-area">
        <span id="input-prompt" class="input-prompt"></span>
        <input id="message-input" type="text"
               placeholder="type a message and press Enter..."
               maxlength="2000" disabled autocomplete="off" />
        <span id="char-count" class="char-count">0 / 2000</span>
        <button id="send-btn" class="btn-send" disabled>send</button>
      </div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-header">online — <span id="user-count">0</span></div>
      <ul id="user-list"></ul>
    </aside>
  </div>
</div>


<!-- ═══ DEBUG PANEL ═══ -->
<div id="debug-panel">
  <div class="debug-header" id="debug-toggle-btn">
    <span class="debug-title">⚡ stomp frames</span>
    <span class="debug-toggle" id="debug-toggle-label">▼ collapse</span>
  </div>
  <div id="debug-log"></div>
</div>


<script>
  // ═══════════════════════════════════════════════════════════════
  // STATE — same plain variables as before
  // In Phase 4 (Vue + Pinia) these become reactive store state.
  // ═══════════════════════════════════════════════════════════════
  let stompClient = null;   // replaces: let socket = null
  let myUsername  = '';
  let onlineUsers = new Set();
  let debugCollapsed = false;

  // Spring Boot server base URL
  // Note: no /ws/websocket suffix anymore — SockJS handles transport
  const SERVER_URL = 'http://localhost:8080/ws';


  // ═══════════════════════════════════════════════════════════════
  // DOM REFERENCES — identical to before
  // ═══════════════════════════════════════════════════════════════
  const joinScreen       = document.getElementById('join-screen');
  const chatScreen       = document.getElementById('chat-screen');
  const usernameInput    = document.getElementById('username-input');
  const joinBtn          = document.getElementById('join-btn');
  const errorText        = document.getElementById('error-text');
  const statusDot        = document.getElementById('status-dot');
  const statusText_el    = document.getElementById('status-text');
  const currentUserLabel = document.getElementById('current-user-label');
  const leaveBtn         = document.getElementById('leave-btn');
  const messageList      = document.getElementById('message-list');
  const messageInput     = document.getElementById('message-input');
  const charCount        = document.getElementById('char-count');
  const sendBtn          = document.getElementById('send-btn');
  const inputPrompt      = document.getElementById('input-prompt');
  const userList         = document.getElementById('user-list');
  const userCount        = document.getElementById('user-count');
  const debugLog         = document.getElementById('debug-log');
  const debugToggleBtn   = document.getElementById('debug-toggle-btn');
  const debugToggleLabel = document.getElementById('debug-toggle-label');


  // ═══════════════════════════════════════════════════════════════
  // HISTORY LOADER — same as Phase 2
  // Uses fetch() to call GET /api/messages before connecting STOMP.
  // ═══════════════════════════════════════════════════════════════
  async function loadHistory() {
    try {
      logDebug('http', 'GET /api/messages');
      const response = await fetch('http://localhost:8080/api/messages');
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const messages = await response.json();
      logDebug('http', 'received ' + messages.length + ' messages');

      if (messages.length > 0) {
        appendHistoryDivider('history (' + messages.length + ' messages)');
        messages.forEach(function(msg) {
          if (msg.type === 'CHAT') {
            appendChatMessage(msg.sender, msg.content, msg.sentAt, msg.sender === myUsername);
          } else {
            appendSystemMessage(msg.content, msg.type === 'JOIN' ? 'join' : 'leave');
          }
        });
        appendHistoryDivider('live ↓');
      }
    } catch (e) {
      logDebug('info', 'history unavailable: ' + e.message);
    }
  }


  // ═══════════════════════════════════════════════════════════════
  // STOMP CONNECTION
  //
  // THIS IS THE KEY CHANGE FROM PHASE 1 AND 2.
  //
  // Before: new WebSocket(url)
  // After:  new StompJs.Client({ ... })
  //
  // The STOMP client wraps SockJS which wraps WebSocket.
  // Three layers:
  //
  //   Your code
  //      ↕  STOMP frames (CONNECT, SEND, SUBSCRIBE, MESSAGE)
  //   @stomp/stompjs
  //      ↕  SockJS protocol (transport negotiation)
  //   SockJS
  //      ↕  WebSocket (or HTTP fallback)
  //   Spring Boot
  // ═══════════════════════════════════════════════════════════════

  async function connect(username) {
    setStatus('connecting');

    // Load history first so it appears before live messages
    await loadHistory();

    /**
     * new StompJs.Client({...})
     *
     * Creates a STOMP client. This does NOT connect yet —
     * it just configures the client. Connection happens
     * when we call stompClient.activate() below.
     *
     * Note: the CDN version of stomp.js uses the global
     * variable Stomp (not StompJs). We use Stomp.client() syntax.
     */

    /**
     * SockJS(SERVER_URL)
     *
     * Creates a SockJS connection to http://localhost:8080/ws.
     * SockJS visits /ws/info first to check what transports
     * are available, then connects via the best one.
     *
     * On a good network: uses native WebSocket → /ws/websocket
     * On restricted network: falls back to HTTP → /ws/xhr_streaming
     *
     * This is completely transparent to our code — we just use
     * stompClient.publish() and it works either way.
     */
    var socket = new SockJS(SERVER_URL);

    /**
     * Stomp.over(socket)
     *
     * Wraps the SockJS socket with STOMP protocol.
     * Now all communication goes through STOMP frames:
     *
     *   CONNECT frame:
     *     CONNECT
     *     accept-version:1.1,1.2
     *     heart-beat:4000,4000
     *
     *   SEND frame (when we publish a message):
     *     SEND
     *     destination:/app/chat.send
     *     content-type:application/json
     *
     *     {"content":"Hello","sender":"alice","type":"CHAT"}
     *
     *   SUBSCRIBE frame (when we subscribe to a topic):
     *     SUBSCRIBE
     *     id:sub-0
     *     destination:/topic/chatroom
     *
     * Spring's @MessageMapping reads the destination header
     * from the SEND frame to route the message correctly.
     * This is what was missing with raw WebSocket.
     */
    stompClient = Stomp.over(socket);

    /**
     * Disable STOMP's built-in console logging.
     * By default it prints every frame to the browser console —
     * very noisy. We handle logging ourselves in the debug panel.
     */
    stompClient.debug = function(str) {
      // Only log connection-related messages, skip heartbeat noise
      if (str.includes('CONNECT') || str.includes('CONNECTED') ||
          str.includes('ERROR') || str.includes('DISCONNECT')) {
        logDebug('stomp', str.trim());
      }
    };

    /**
     * stompClient.connect(headers, onConnected, onError)
     *
     * Initiates the full connection sequence:
     *   1. SockJS opens transport (WebSocket or HTTP)
     *   2. STOMP sends CONNECT frame
     *   3. Spring validates and sends CONNECTED frame
     *   4. onConnected callback fires — safe to subscribe + publish
     *
     * headers: {} — we send no special headers for now.
     * In Phase 4 (Security) we add: { Authorization: 'Bearer ' + token }
     */
    stompClient.connect(
      {},

      // ── onConnected callback ────────────────────────────────
      /**
       * Fires when Spring sends back the STOMP CONNECTED frame.
       * At this point the connection is fully established.
       * Safe to subscribe and publish.
       */
      function onConnected(frame) {
        logDebug('stomp', 'CONNECTED — ' + frame);
        setStatus('connected');

        // Show chat screen
        joinScreen.style.display = 'none';
        chatScreen.style.display = 'flex';
        currentUserLabel.textContent = username;
        inputPrompt.textContent = username + ' >';

        onlineUsers.add(username);
        renderUserList();
        messageInput.disabled = false;
        sendBtn.disabled = false;
        messageInput.focus();

        /**
         * SUBSCRIBE to /topic/chatroom
         *
         * This sends a STOMP SUBSCRIBE frame to Spring Boot:
         *   SUBSCRIBE
         *   id:sub-0
         *   destination:/topic/chatroom
         *
         * Spring registers us as a subscriber.
         * Every time ChatMessageListener (our RabbitMQ consumer)
         * calls messagingTemplate.convertAndSend("/topic/chatroom", msg),
         * Spring delivers it here.
         *
         * The callback fires for every message we receive.
         * frame.body is the JSON string of the ChatMessage.
         */
        stompClient.subscribe('/topic/chatroom', function(frame) {
          logDebug('recv', frame.body);
          var message = JSON.parse(frame.body);
          handleIncomingMessage(message);
        });

        /**
         * ANNOUNCE JOIN via /app/chat.addUser
         *
         * This sends a STOMP SEND frame:
         *   SEND
         *   destination:/app/chat.addUser
         *   content-type:application/json
         *
         *   {"sender":"alice","type":"JOIN","content":""}
         *
         * Spring routes this to ChatController.addUser()
         * because of @MessageMapping("/chat.addUser").
         * (Spring strips the /app prefix before matching.)
         *
         * ChatController.addUser() then:
         *   1. Stores username in session (for disconnect detection)
         *   2. Saves JOIN to H2
         *   3. Publishes to RabbitMQ
         *   4. ChatMessageListener broadcasts to /topic/chatroom
         *   5. All clients see "alice joined the chat"
         */
        stompClient.send(
          '/app/chat.addUser',
          {},
          JSON.stringify({ sender: username, type: 'JOIN', content: '' })
        );

        appendSystemMessage('you joined · ' + new Date().toLocaleTimeString(), 'join');
      },

      // ── onError callback ────────────────────────────────────
      /**
       * Fires if the STOMP connection fails.
       * Common causes:
       *   - Spring Boot not running
       *   - Wrong URL
       *   - STOMP connection rejected by server
       */
      function onError(error) {
        logDebug('stomp', 'ERROR — ' + error);
        setStatus('error');
        showError('Cannot connect. Is Spring Boot running on port 8080?');
        joinBtn.disabled = false;
        joinBtn.textContent = 'connect → join';
      }
    );
  }


  // ═══════════════════════════════════════════════════════════════
  // SEND MESSAGE
  //
  // Before: socket.send(JSON.stringify({...}))
  // After:  stompClient.send('/app/chat.send', {}, JSON.stringify({...}))
  //
  // The difference:
  //   socket.send() — sends raw bytes, no routing info
  //   stompClient.send() — sends a STOMP SEND frame WITH destination header
  //
  // Spring reads the destination header (/app/chat.send),
  // strips /app, matches @MessageMapping("/chat.send"),
  // and routes to ChatController.sendMessage().
  // ═══════════════════════════════════════════════════════════════

  function sendMessage(content) {
    if (!stompClient || !stompClient.connected) {
      logDebug('info', 'cannot send — not connected');
      return;
    }

    /**
     * stompClient.send(destination, headers, body)
     *
     * destination: '/app/chat.send'
     *   The /app prefix routes to @MessageMapping in Spring.
     *   Without this prefix, the message goes directly to the broker
     *   (bypassing your controller — no validation, no DB save).
     *
     * headers: {}
     *   No extra headers needed for basic chat.
     *   In Phase 4 (Security) we add auth headers here.
     *
     * body: JSON string of the message
     *   Spring's @Payload ChatMessage deserializes this automatically.
     *   We only need content and sender — Spring sets type and sentAt.
     */
    var payload = JSON.stringify({
      content: content,
      sender: myUsername,
      type: 'CHAT'
    });

    logDebug('send', '/app/chat.send → ' + payload);
    stompClient.send('/app/chat.send', {}, payload);
  }


  // ═══════════════════════════════════════════════════════════════
  // DISCONNECT
  // ═══════════════════════════════════════════════════════════════

  function disconnect() {
    if (stompClient) {
      /**
       * stompClient.disconnect()
       *
       * Sends a STOMP DISCONNECT frame gracefully.
       * Spring receives it, fires SessionDisconnectEvent,
       * WebSocketEventListener broadcasts the LEAVE message.
       *
       * This is cleaner than just closing the connection —
       * the server knows immediately you left rather than
       * waiting for heartbeat timeout.
       */
      stompClient.disconnect(function() {
        logDebug('stomp', 'DISCONNECTED');
      });
      stompClient = null;
    }

    chatScreen.style.display = 'none';
    joinScreen.style.display = 'flex';
    onlineUsers.clear();
    messageList.innerHTML = '';
    userList.innerHTML = '';
    userCount.textContent = '0';
    messageInput.disabled = true;
    sendBtn.disabled = true;
    setStatus('disconnected');
  }


  // ═══════════════════════════════════════════════════════════════
  // MESSAGE HANDLERS
  // Same logic as before — just receives the parsed message object
  // and updates the DOM accordingly.
  // ═══════════════════════════════════════════════════════════════

  function handleIncomingMessage(message) {
    if (message.type === 'CHAT') {
      var isMine = (message.sender === myUsername);
      appendChatMessage(message.sender, message.content, message.sentAt, isMine);
    } else if (message.type === 'JOIN') {
      if (message.sender !== myUsername) {
        onlineUsers.add(message.sender);
        renderUserList();
        appendSystemMessage(message.content, 'join');
      }
    } else if (message.type === 'LEAVE') {
      onlineUsers.delete(message.sender);
      renderUserList();
      appendSystemMessage(message.content, 'leave');
    }
  }


  // ═══════════════════════════════════════════════════════════════
  // DOM HELPERS — identical to Phase 1 and 2
  // ═══════════════════════════════════════════════════════════════

  function appendChatMessage(sender, content, sentAt, isMine) {
    var wrapper = document.createElement('div');
    wrapper.className = 'message ' + (isMine ? 'mine' : 'theirs');

    var avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.style.background = getAvatarColor(sender);
    avatar.style.color = '#fff';
    avatar.textContent = sender.charAt(0).toUpperCase();

    var body = document.createElement('div');
    body.className = 'message-body';

    var meta = document.createElement('div');
    meta.className = 'message-meta';

    var senderEl = document.createElement('span');
    senderEl.className = 'message-sender';
    senderEl.textContent = isMine ? 'you' : sender;

    var timeEl = document.createElement('span');
    timeEl.className = 'message-time';
    timeEl.textContent = formatTime(sentAt);

    meta.appendChild(senderEl);
    meta.appendChild(timeEl);

    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content; // textContent not innerHTML — prevents XSS

    body.appendChild(meta);
    body.appendChild(bubble);
    wrapper.appendChild(avatar);
    wrapper.appendChild(body);
    messageList.appendChild(wrapper);
    scrollToBottom();
  }

  function appendSystemMessage(text, type) {
    var wrapper = document.createElement('div');
    wrapper.className = 'system-event';
    var pill = document.createElement('span');
    pill.className = 'system-event-text ' + (type || '');
    pill.textContent = text;
    wrapper.appendChild(pill);
    messageList.appendChild(wrapper);
    scrollToBottom();
  }

  function appendHistoryDivider(label) {
    var d = document.createElement('div');
    d.className = 'history-divider';
    var s = document.createElement('span');
    s.textContent = label;
    d.appendChild(s);
    messageList.appendChild(d);
  }

  function renderUserList() {
    userList.innerHTML = '';
    userCount.textContent = onlineUsers.size;
    onlineUsers.forEach(function(u) {
      var li = document.createElement('li');
      li.className = 'user-item' + (u === myUsername ? ' me' : '');
      var dot = document.createElement('div');
      dot.className = 'online-dot';
      var name = document.createElement('span');
      name.textContent = u + (u === myUsername ? ' (you)' : '');
      li.appendChild(dot);
      li.appendChild(name);
      userList.appendChild(li);
    });
  }

  function scrollToBottom() {
    messageList.scrollTo({ top: messageList.scrollHeight, behavior: 'smooth' });
  }

  function setStatus(s) {
    statusDot.className = 'status-dot ' + s;
    statusText_el.textContent = s;
  }

  function showError(msg) { errorText.style.display = 'block'; errorText.textContent = msg; }
  function hideError()    { errorText.style.display = 'none';  errorText.textContent = ''; }

  function formatTime(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); }
    catch(e) { return ''; }
  }

  function getAvatarColor(username) {
    var colors = ['#1f4068','#1b4332','#3d1a78','#5c2018','#1a3a4a','#2d4a1e','#4a1a2e','#1a3d3d'];
    return colors[(username.charCodeAt(0) || 0) % colors.length];
  }

  function logDebug(tag, msg) {
    var entry = document.createElement('div');
    entry.className = 'debug-entry';
    var ts = document.createElement('span');
    ts.className = 'debug-ts';
    ts.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var tagEl = document.createElement('span');
    tagEl.className = 'debug-tag ' + tag;
    tagEl.textContent = tag.toUpperCase();
    var msgEl = document.createElement('span');
    msgEl.className = 'debug-msg';
    msgEl.textContent = String(msg).length > 160 ? String(msg).substring(0, 160) + '...' : String(msg);
    entry.appendChild(ts); entry.appendChild(tagEl); entry.appendChild(msgEl);
    debugLog.appendChild(entry);
    debugLog.scrollTop = debugLog.scrollHeight;
  }


  // ═══════════════════════════════════════════════════════════════
  // EVENT LISTENERS — same as before
  // ═══════════════════════════════════════════════════════════════

  joinBtn.addEventListener('click', function() {
    var username = usernameInput.value.trim();
    if (!username) { showError('Please enter a username.'); return; }
    hideError();
    myUsername = username;
    joinBtn.disabled = true;
    joinBtn.textContent = 'connecting...';
    connect(username);
  });

  usernameInput.addEventListener('keyup', function(e) { if (e.key === 'Enter') joinBtn.click(); });
  leaveBtn.addEventListener('click', disconnect);

  sendBtn.addEventListener('click', function() {
    var content = messageInput.value.trim();
    if (!content) return;
    sendMessage(content);
    messageInput.value = '';
    charCount.textContent = '0 / 2000';
    messageInput.focus();
  });

  messageInput.addEventListener('keyup', function(e) { if (e.key === 'Enter') sendBtn.click(); });
  messageInput.addEventListener('input', function()  { charCount.textContent = this.value.length + ' / 2000'; });

  debugToggleBtn.addEventListener('click', function() {
    debugCollapsed = !debugCollapsed;
    debugLog.style.display = debugCollapsed ? 'none' : 'flex';
    debugToggleLabel.textContent = debugCollapsed ? '▶ expand' : '▼ collapse';
  });

  window.addEventListener('beforeunload', function() {
    if (stompClient) stompClient.disconnect();
  });

  logDebug('info', 'STOMP client ready — Spring Boot + RabbitMQ required');
  logDebug('info', 'Start Spring Boot first, then enter username and connect');
  logDebug('info', 'Open two tabs with different usernames to test broadcast');
</script>

</body>
</html>
